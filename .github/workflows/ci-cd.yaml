name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: brule
  DEPLOYMENT_NAME: brule-deployment
  CONTAINER_NAME: brule

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Generate Version
      run: |
        VERSION=v$(date +%s)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Docker Login
      run: |
        echo "${{ secrets.JFROG_PASSWORD }}" | docker login ${{ secrets.JFROG_REGISTRY }} \
        -u ${{ secrets.JFROG_USERNAME }} \
        --password-stdin

    - name: Build Image
      run: |
        docker build -t ${{ secrets.JFROG_REGISTRY }}/docker-trial/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .

    - name: Push Image
      run: |
        docker push ${{ secrets.JFROG_REGISTRY }}/docker-trial/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    # ✅ Setup kubeconfig (REAL cluster only)
    - name: Setup Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    # ✅ Verify cluster (debug)
    - name: Verify Cluster
      run: |
        kubectl cluster-info
        kubectl get nodes

    # ✅ Apply base YAML
    - name: Apply Manifests
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    # ✅ Inject new image (dynamic)
    - name: Update Image
      run: |
        kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
        ${{ env.CONTAINER_NAME }}=${{ secrets.JFROG_REGISTRY }}/docker-trial/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    # ✅ Zero downtime rollout
    - name: Rollout Status
      run: |
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }}