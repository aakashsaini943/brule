name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: brule
  DEPLOYMENT_NAME: brule-deployment
  CONTAINER_NAME: brule
  NAMESPACE: default

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    # ✅ Versioning (timestamp based)
    - name: Generate Version
      run: |
        VERSION=v$(date +%s)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    # ✅ Docker Login (JFrog)
    - name: Docker Login
      run: |
        echo "${{ secrets.JFROG_PASSWORD }}" | docker login ${{ secrets.JFROG_REGISTRY }} \
        -u ${{ secrets.JFROG_USERNAME }} \
        --password-stdin

    # ✅ Build Image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.JFROG_REGISTRY }}/docker-trial/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .

    # ✅ Push Image
    - name: Push Image
      run: |
        docker push ${{ secrets.JFROG_REGISTRY }}/docker-trial/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    # ✅ Setup Kubeconfig (FIXED)
    - name: Setup Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    # ✅ DEBUG (VERY IMPORTANT)
    - name: Verify Cluster Connection
      run: |
        kubectl cluster-info
        kubectl get nodes

    # ✅ Deploy (Safe Apply)
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml -n $NAMESPACE
        kubectl apply -f k8s/service.yaml -n $NAMESPACE

    # ✅ Update Image (Rolling Update - Zero Downtime)
    - name: Update Image
      run: |
        kubectl set image deployment/$DEPLOYMENT_NAME \
        $CONTAINER_NAME=${{ secrets.JFROG_REGISTRY }}/docker-trial/${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
        -n $NAMESPACE

    # ✅ Rollout Status (Zero Downtime Check)
    - name: Check Rollout Status
      run: |
        kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE