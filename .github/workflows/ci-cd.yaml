name: CI-CD Pipeline (KinD)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: brule
  DEPLOYMENT_NAME: brule-deployment
  CONTAINER_NAME: brule

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Generate Version
      run: |
        VERSION=v$(date +%s)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    #  Login to JFrog
    - name: Docker Login
      run: |
        echo "${{ secrets.JFROG_PASSWORD }}" | docker login ${{ secrets.JFROG_REGISTRY }} \
        -u ${{ secrets.JFROG_USERNAME }} \
        --password-stdin

    #  Build Image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.JFROG_REGISTRY }}/brule-docker/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .

    #  Push Image
    - name: Push Image
      run: |
        docker push ${{ secrets.JFROG_REGISTRY }}/brule-docker/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    #  Setup KinD
    - name: Setup Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker

    #  Verify cluster
    - name: Verify Cluster
      run: |
        kubectl cluster-info
        kubectl get nodes

    #  Create image pull secret
    - name: Create Image Pull Secret
      run: |
        kubectl create secret docker-registry jfrog-secret \
          --docker-server=${{ secrets.JFROG_REGISTRY }} \
          --docker-username=${{ secrets.JFROG_USERNAME }} \
          --docker-password=${{ secrets.JFROG_PASSWORD }} \
          --docker-email=dev@example.com || true

    #  Apply manifests
    - name: Apply Manifests
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    #  Update image dynamically
    - name: Update Image
      run: |
        kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
        ${{ env.CONTAINER_NAME }}=${{ secrets.JFROG_REGISTRY }}/brule-docker/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    #  Rollout with timeout
    - name: Rollout Status
      run: |
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=120s

    #  Debug if failed
    - name: Debug Pods
      if: failure()
      run: |
        kubectl get pods -o wide
        kubectl describe pods