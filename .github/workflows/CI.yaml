name: CI - Build & Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login (JFrog)
      run: |
        docker login ${{ secrets.JFROG_URL }} \
        -u ${{ secrets.JFROG_USERNAME }} \
        -p ${{ secrets.JFROG_TOKEN }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.JFROG_URL }}/devops-app:latest .

    - name: Push Image
      run: |
        docker push ${{ secrets.JFROG_URL }}/devops-app:latest