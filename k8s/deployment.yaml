apiVersion: apps/v1
kind: Deployment
metadata:
  name: brule-deployment
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: brule

  template:
    metadata:
      labels:
        app: brule

    spec:
      containers:
      - name: brule
        image: dummy   # will be replaced
        ports:
        - containerPort: 80

      imagePullSecrets:
      - name: jfrog-secret